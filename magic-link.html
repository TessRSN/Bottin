<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSN — Modifier mon profil</title>
<script>
  // Apply theme ASAP to avoid flash
  (function(){
    try {
      var t = localStorage.getItem('rsn-theme');
      if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
    } catch(e) {}
  })();
</script>
<style>
  :root { --bg:#f7fafc; --card:#fff; --text:#1a202c; --muted:#718096; --primary:#2b6cb0; --border:#e2e8f0; }
  [data-theme="dark"] { --bg:#0f1724; --card:#1e293b; --text:#e2e8f0; --muted:#94a3b8; --primary:#63b3ed; --border:#334155; }
  * { box-sizing:border-box; margin:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; }
  .card { background:var(--card); border-radius:1rem; padding:2.5rem; max-width:420px; width:100%; box-shadow:0 4px 24px rgba(0,0,0,.1); text-align:center; }
  h1 { font-size:1.3rem; margin-bottom:.5rem; color:var(--primary); }
  p { font-size:.9rem; color:var(--muted); margin-bottom:1.5rem; line-height:1.5; }
  .input-group { display:flex; gap:.5rem; margin-bottom:1rem; }
  input[type="email"] { flex:1; padding:.65rem 1rem; border:1.5px solid var(--border); border-radius:.5rem; font-size:.95rem; background:var(--card); color:var(--text); outline:none; }
  input:focus { border-color:var(--primary); }
  button { padding:.65rem 1.5rem; border:none; border-radius:.5rem; background:var(--primary); color:#fff; font-size:.95rem; font-weight:600; cursor:pointer; transition:opacity .2s; }
  button:hover { opacity:.85; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .msg { margin-top:1rem; padding:.75rem; border-radius:.5rem; font-size:.85rem; line-height:1.4; }
  .msg.success { background:#c6f6d5; color:#22543d; }
  .msg.error { background:#fed7d7; color:#9b2c2c; }
  [data-theme="dark"] .msg.success { background:#22543d; color:#c6f6d5; }
  [data-theme="dark"] .msg.error { background:#9b2c2c; color:#fed7d7; }
  .top-controls { position:absolute; top:1rem; right:1rem; display:flex; gap:.4rem; }
  .top-btn { background:none; border:1px solid var(--border); color:var(--muted); font-size:.8rem; padding:.3rem .6rem; border-radius:.3rem; cursor:pointer; display:inline-flex; align-items:center; gap:.3rem; }
  .top-btn:hover { color:var(--text); border-color:var(--primary); }
  .top-btn svg { width:14px; height:14px; }
  .hidden { display:none !important; }
  .back { display:inline-block; margin-top:1rem; font-size:.8rem; color:var(--muted); text-decoration:none; }
  .back:hover { color:var(--primary); }
</style>
</head>
<body>
<div class="top-controls">
  <button class="top-btn" onclick="toggleTheme()" id="themeBtn" title="Theme" aria-label="Theme">
    <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg id="iconMoon" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
  <button class="top-btn" onclick="toggleLang()" id="langBtn">EN</button>
</div>
<div class="card">
  <h1 id="title">Modifier mon profil</h1>
  <p id="desc">Entrez votre courriel institutionnel pour recevoir un lien de modification sécurisé.</p>

  <div class="input-group">
    <input type="email" id="email" placeholder="votre.email@institution.ca" autocomplete="email">
    <button id="submit" onclick="send()">
      <span id="btnText">Envoyer</span>
    </button>
  </div>

  <div id="msg" class="msg" style="display:none"></div>

  <a class="back" href="/" id="backLink">← Retour au bottin</a>
</div>

<script>
const i18n = {
  fr: {
    title: 'Modifier mon profil',
    desc: 'Entrez votre courriel institutionnel pour recevoir un lien de modification sécurisé.',
    btn: 'Envoyer',
    sending: 'Envoi...',
    success: 'Si votre courriel est dans notre base, vous recevrez un lien de modification dans les prochaines minutes. Vérifiez vos courriels indésirables.',
    error: 'Une erreur est survenue. Veuillez réessayer.',
    invalid: 'Veuillez entrer un courriel valide.',
    back: '← Retour au bottin',
    lang: 'EN',
  },
  en: {
    title: 'Update my profile',
    desc: 'Enter your institutional email to receive a secure edit link.',
    btn: 'Send',
    sending: 'Sending...',
    success: 'If your email is in our database, you will receive an edit link shortly. Check your spam folder.',
    error: 'An error occurred. Please try again.',
    invalid: 'Please enter a valid email.',
    back: '← Back to directory',
    lang: 'FR',
  }
};
let lang = (function(){ try { return localStorage.getItem('rsn-lang') || 'fr'; } catch(e){ return 'fr'; } })();

function t(key) { return i18n[lang][key] || key; }

function applyLang() {
  document.documentElement.lang = lang;
  document.getElementById('title').textContent = t('title');
  document.getElementById('desc').textContent = t('desc');
  document.getElementById('btnText').textContent = t('btn');
  document.getElementById('backLink').textContent = t('back');
  document.getElementById('langBtn').textContent = t('lang');
}

function toggleLang() {
  lang = lang === 'fr' ? 'en' : 'fr';
  try { localStorage.setItem('rsn-lang', lang); } catch(e) {}
  applyLang();
  document.getElementById('msg').style.display = 'none';
}

function updateThemeIcons() {
  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.getElementById('iconSun').classList.toggle('hidden', isDark);
  document.getElementById('iconMoon').classList.toggle('hidden', !isDark);
}

function toggleTheme() {
  var cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
  var next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try { localStorage.setItem('rsn-theme', next); } catch(e) {}
  updateThemeIcons();
}

// Init on load
(function(){
  updateThemeIcons();
  applyLang();
  document.getElementById('email').placeholder = lang === 'fr' ? 'votre.email@institution.ca' : 'your.email@institution.ca';
})();

async function send() {
  const email = document.getElementById('email').value.trim();
  if (!email || !email.includes('@')) {
    showMsg(t('invalid'), 'error');
    return;
  }

  const btn = document.getElementById('submit');
  const btnText = document.getElementById('btnText');
  btn.disabled = true;
  btnText.textContent = t('sending');

  try {
    const resp = await fetch('/api/magic-link', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, lang }),
    });

    if (resp.ok) {
      showMsg(t('success'), 'success');
    } else {
      showMsg(t('error'), 'error');
    }
  } catch (e) {
    showMsg(t('error'), 'error');
  }

  btn.disabled = false;
  btnText.textContent = t('btn');
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

// Submit on Enter
document.getElementById('email').addEventListener('keypress', e => {
  if (e.key === 'Enter') send();
});
</script>
</body>
</html>
